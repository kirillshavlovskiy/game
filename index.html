<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dice Of The Damned</title>
  <style>
    :root {
      --maze-wall-tex: url("/textures/maze/Stone/Horror_Stone_02-256x256.png");
      --maze-floor-tex: url("/textures/maze/Brick/Horror_Brick_07-256x256.png");
      --maze-noise-tex: url("/textures/maze/Brick/Horror_Brick_07-256x256.png");
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Courier New', monospace;
      background: #0a0a0f;
      color: #c0c0c0;
    }
    .main {
      display: flex;
      flex-wrap: wrap;
      gap: 2rem;
      align-items: flex-start;
      justify-content: center;
      padding: 1.5rem;
    }
    h1 { margin: 0 0 1rem 0; line-height: 0; }
    h1 .game-title-label {
      display: block;
      width: 100%;
      max-width: min(100%, 420px);
      height: auto;
      margin: 0 auto;
      filter: drop-shadow(0 4px 18px rgba(0,0,0,0.85));
    }
    .maze-wrap {
      position: relative;
      background: #1a1a24;
      padding: 1.5rem;
      border-radius: 8px;
      border: 1px solid #333;
      box-shadow: 0 0 20px rgba(0,255,136,0.1);
      isolation: isolate;
    }
    .maze-wrap.maze-horror-render::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      border-radius: inherit;
      z-index: 1;
      background:
        radial-gradient(ellipse 32% 28% at 18% 38%, rgba(255, 228, 200, 0.1) 0%, transparent 70%),
        radial-gradient(ellipse 30% 26% at 82% 55%, rgba(220, 200, 255, 0.09) 0%, transparent 68%),
        radial-gradient(ellipse 36% 30% at 52% 18%, rgba(255, 240, 220, 0.07) 0%, transparent 65%),
        radial-gradient(ellipse 68% 58% at 50% 44%, rgba(200, 190, 230, 0.08) 0%, transparent 52%),
        radial-gradient(ellipse 88% 78% at 50% 42%, transparent 22%, rgba(0, 0, 0, 0.55) 100%);
    }
    .maze-wrap.maze-horror-render::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      border-radius: inherit;
      z-index: 1;
      opacity: 0.11;
      mix-blend-mode: overlay;
      background-image: var(--maze-noise-tex);
      background-size: 96px 96px;
      background-repeat: repeat;
    }
    .maze-wrap.maze-horror-render > h1,
    .maze-wrap.maze-horror-render .maze-stack {
      position: relative;
      z-index: 2;
    }
    .maze-stack {
      display: inline-flex;
      flex-direction: column;
      align-items: center;
    }
    .maze {
      display: grid;
      gap: 0;
      font-size: 1.25rem;
      line-height: 1;
      letter-spacing: 0.02em;
    }
    .cell {
      width: 32px;
      height: 32px;
      min-width: 32px;
      min-height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .cell.wall {
      color: #8a88a0;
      background-color: #181820;
      background-image:
        linear-gradient(180deg, rgba(110, 96, 150, 0.2) 0%, rgba(20, 18, 32, 0.05) 40%, rgba(0, 0, 0, 0.38) 100%),
        linear-gradient(155deg, rgba(22, 16, 40, 0.48) 0%, rgba(12, 8, 24, 0.42) 45%, rgba(28, 20, 44, 0.52) 100%),
        var(--maze-wall-tex);
      background-size: auto, auto, 32px 32px;
      background-repeat: no-repeat, no-repeat, repeat;
      box-shadow: none;
      border: none;
      outline: none;
    }
    .cell.path {
      color: #6a6478;
      background-color: #0f0f14;
      background-image:
        linear-gradient(180deg, rgba(130, 118, 100, 0.16) 0%, rgba(30, 26, 22, 0.08) 45%, rgba(0, 0, 0, 0.52) 100%),
        linear-gradient(168deg, rgba(14, 12, 18, 0.62) 0%, rgba(6, 5, 10, 0.55) 52%, rgba(18, 14, 12, 0.65) 100%),
        var(--maze-floor-tex);
      background-size: auto, auto, 32px 32px;
      background-repeat: no-repeat, no-repeat, repeat;
      box-shadow:
        inset 0 1px 0 rgba(90, 82, 72, 0.08),
        inset 0 2px 10px rgba(0, 0, 0, 0.32);
    }
    .cell.start {
      color: #00ff88;
      background-color: #0f0f14;
      background-image:
        linear-gradient(rgba(30, 56, 42, 0.9), rgba(30, 56, 42, 0.9)),
        linear-gradient(180deg, rgba(130, 118, 100, 0.16) 0%, rgba(30, 26, 22, 0.08) 45%, rgba(0, 0, 0, 0.52) 100%),
        linear-gradient(168deg, rgba(14, 12, 18, 0.62) 0%, rgba(6, 5, 10, 0.55) 52%, rgba(18, 14, 12, 0.65) 100%),
        var(--maze-floor-tex);
      background-size: auto, auto, auto, 32px 32px;
      background-repeat: no-repeat, no-repeat, no-repeat, repeat;
    }
    .cell.goal {
      color: #ff4444;
      background-color: #0f0f14;
      background-image:
        linear-gradient(rgba(52, 34, 34, 0.9), rgba(52, 34, 34, 0.9)),
        linear-gradient(180deg, rgba(130, 118, 100, 0.16) 0%, rgba(30, 26, 22, 0.08) 45%, rgba(0, 0, 0, 0.52) 100%),
        linear-gradient(168deg, rgba(14, 12, 18, 0.62) 0%, rgba(6, 5, 10, 0.55) 52%, rgba(18, 14, 12, 0.65) 100%),
        var(--maze-floor-tex);
      background-size: auto, auto, auto, 32px 32px;
      background-repeat: no-repeat, no-repeat, no-repeat, repeat;
    }
    .cell.player {
      color: #00ff88;
      font-weight: bold;
      background-color: #0f0f14;
      background-image:
        linear-gradient(rgba(30, 56, 42, 0.88), rgba(30, 56, 42, 0.88)),
        linear-gradient(180deg, rgba(130, 118, 100, 0.16) 0%, rgba(30, 26, 22, 0.08) 45%, rgba(0, 0, 0, 0.52) 100%),
        linear-gradient(168deg, rgba(14, 12, 18, 0.62) 0%, rgba(6, 5, 10, 0.55) 52%, rgba(18, 14, 12, 0.65) 100%),
        var(--maze-floor-tex);
      background-size: auto, auto, auto, 32px 32px;
      background-repeat: no-repeat, no-repeat, no-repeat, repeat;
    }
    .cell .marker {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      margin: auto;
      display: flex;
      align-items: center;
      justify-content: center;
      box-sizing: border-box;
    }
    .cell .marker.active {
      box-shadow: 0 0 8px currentColor, 0 0 12px currentColor;
      transform: scale(1.15);
    }
    .player-legend { display: flex; gap: 0.75rem; flex-wrap: wrap; margin-top: 0.5rem; font-size: 0.8rem; }
    .player-legend span { display: flex; align-items: center; gap: 0.25rem; }
    .player-legend .dot { width: 14px; height: 14px; border-radius: 50%; }
    .player-legend .legend-item.active .dot { box-shadow: 0 0 6px currentColor; }
    .controls-panel {
      width: 280px;
      flex-shrink: 0;
      background: #1a1a24;
      padding: 1.5rem;
      border-radius: 8px;
      border: 1px solid #333;
      box-shadow: 0 0 20px rgba(0,255,136,0.1);
      display: flex;
      flex-direction: column;
      gap: 0;
    }
    .controls-panel .row { margin-top: 0.5rem; }
    .controls-panel .info:first-of-type { margin-top: 0; }
    .move-buttons { display: grid; grid-template-columns: repeat(3, 2.5rem); grid-template-rows: repeat(3, 2.5rem); gap: 2px; margin-top: 0.5rem; }
    .move-buttons button { width: 2.5rem; height: 2.5rem; padding: 0; font-size: 1.2rem; }
    .move-buttons .up { grid-column: 2; grid-row: 1; }
    .move-buttons .left { grid-column: 1; grid-row: 2; }
    .move-buttons .right { grid-column: 3; grid-row: 2; }
    .move-buttons .down { grid-column: 2; grid-row: 3; }
    .dice { font-size: 1.5rem; margin: 0 0.5rem; }
    .info { margin-top: 1rem; font-size: 0.85rem; color: #888; }
    .controls { margin-top: 0.5rem; font-size: 0.8rem; }
    .won { margin-top: 1rem; color: #00ff88; font-weight: bold; }
    .row { display: flex; gap: 1rem; align-items: center; margin-top: 0.75rem; flex-wrap: wrap; }
    .row label { display: flex; align-items: center; gap: 0.5rem; }
    .row input[type="number"] { width: 3rem; padding: 0.25rem; font-family: inherit; background: #2a2a35; border: 1px solid #444; color: #c0c0c0; border-radius: 4px; }
    .row select { padding: 0.25rem 0.5rem; font-family: inherit; background: #2a2a35; border: 1px solid #444; color: #c0c0c0; border-radius: 4px; }
    button {
      padding: 0.5rem 1rem;
      font-family: inherit;
      font-size: 0.9rem;
      background: #00ff88;
      color: #0a0a0f;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    button:hover { background: #00cc6a; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    button.secondary { background: #444; color: #c0c0c0; }
    button.secondary:hover { background: #555; }
    .error { color: #ff6666; font-size: 0.85rem; margin-top: 0.5rem; }

    .dice-tray {
      margin-top: 1rem;
      padding: 1.25rem;
      background: #0d0d12;
      border-radius: 12px;
      border: 1px solid #333;
      min-height: 110px;
      display: flex;
      align-items: center;
      justify-content: center;
      touch-action: none;
      position: relative;
      perspective: 300px;
    }
    .dice-tray .hint { position: absolute; bottom: 0.5rem; left: 0; right: 0; text-align: center; font-size: 0.7rem; color: #555; }
    .dice-physical {
      width: 52px;
      height: 52px;
      background: linear-gradient(145deg, #f0f0f0, #fff);
      border-radius: 10px;
      box-shadow: 0 3px 10px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.9);
      cursor: grab;
      user-select: none;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      touch-action: none;
      transform-style: preserve-3d;
      perspective: 200px;
    }
    .dice-physical:active { cursor: grabbing; }
    .dice-physical.rolling { cursor: default; pointer-events: none; }
    .dice-physical .face {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: repeat(3, 1fr);
      width: 36px;
      height: 36px;
      gap: 4px;
    }
    .dice-physical .face .pip {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #222;
      margin: auto;
    }
    .dice-physical .face.f1 .pip { grid-column: 2; grid-row: 2; }
    .dice-physical .face.f2 .p1 { grid-column: 1; grid-row: 1; } .dice-physical .face.f2 .p2 { grid-column: 3; grid-row: 3; }
    .dice-physical .face.f3 .p1 { grid-column: 1; grid-row: 1; } .dice-physical .face.f3 .p2 { grid-column: 2; grid-row: 2; } .dice-physical .face.f3 .p3 { grid-column: 3; grid-row: 3; }
    .dice-physical .face.f4 .p1 { grid-column: 1; grid-row: 1; } .dice-physical .face.f4 .p2 { grid-column: 3; grid-row: 1; } .dice-physical .face.f4 .p3 { grid-column: 1; grid-row: 3; } .dice-physical .face.f4 .p4 { grid-column: 3; grid-row: 3; }
    .dice-physical .face.f5 .p1 { grid-column: 1; grid-row: 1; } .dice-physical .face.f5 .p2 { grid-column: 3; grid-row: 1; } .dice-physical .face.f5 .p3 { grid-column: 2; grid-row: 2; } .dice-physical .face.f5 .p4 { grid-column: 1; grid-row: 3; } .dice-physical .face.f5 .p5 { grid-column: 3; grid-row: 3; }
    .dice-physical .face.f6 .p1 { grid-column: 1; grid-row: 1; } .dice-physical .face.f6 .p2 { grid-column: 3; grid-row: 1; } .dice-physical .face.f6 .p3 { grid-column: 1; grid-row: 2; } .dice-physical .face.f6 .p4 { grid-column: 3; grid-row: 2; } .dice-physical .face.f6 .p5 { grid-column: 1; grid-row: 3; } .dice-physical .face.f6 .p6 { grid-column: 3; grid-row: 3; }
    .dice-physical .face { display: none; }
    .dice-physical .face.show { display: grid; }
    @keyframes diceRoll {
      0% {
        transform: translateY(0) rotateX(0deg) rotateY(0deg) rotateZ(0deg) scale(1);
      }
      15% {
        transform: translateY(var(--rise, -25px)) rotateX(120deg) rotateY(80deg) rotateZ(60deg) scale(1.05);
      }
      30% {
        transform: translateY(var(--peak, -35px)) rotateX(240deg) rotateY(160deg) rotateZ(120deg) scale(1.08);
      }
      45% {
        transform: translateY(var(--fall, -15px)) rotateX(360deg) rotateY(240deg) rotateZ(200deg) scale(1.04);
      }
      60% {
        transform: translateY(6px) rotateX(480deg) rotateY(320deg) rotateZ(280deg) scale(1.02);
      }
      75% {
        transform: translateY(-3px) rotateX(600deg) rotateY(400deg) rotateZ(350deg) scale(1.01);
      }
      90% {
        transform: translateY(2px) rotateX(700deg) rotateY(450deg) rotateZ(400deg) scale(1);
      }
      100% {
        transform: translateY(0) rotateX(720deg) rotateY(480deg) rotateZ(450deg) scale(1);
      }
    }
  </style>
</head>
<body>
  <div class="main">
    <div class="maze-wrap maze-horror-render">
      <div class="maze-stack">
        <h1><img class="game-title-label" src="/menu/dice-of-the-damned-label.png" width="1024" height="419" alt="Dice Of The Damned" /></h1>
        <div id="maze" class="maze"></div>
      </div>
    </div>
    <div class="controls-panel">
      <div class="info">
        <span id="turnInfo">Player 1</span> &nbsp;|&nbsp;
        Moves left: <span id="movesLeft">0</span> &nbsp;|&nbsp;
        Moves: <span id="moves">0</span>
      </div>
      <div class="info" style="margin-top:0.25rem">S=Start &nbsp; X=Goal</div>
      <div id="playerLegend" class="player-legend"></div>
      <div class="dice-tray" id="diceTray">
        <span class="hint">Drag dice up & release to roll</span>
        <div class="dice-physical" id="dicePhysical" title="Drag up and release to roll">
          <div class="face f1"><span class="pip"></span></div>
          <div class="face f2"><span class="pip p1"></span><span class="pip p2"></span></div>
          <div class="face f3"><span class="pip p1"></span><span class="pip p2"></span><span class="pip p3"></span></div>
          <div class="face f4"><span class="pip p1"></span><span class="pip p2"></span><span class="pip p3"></span><span class="pip p4"></span></div>
          <div class="face f5"><span class="pip p1"></span><span class="pip p2"></span><span class="pip p3"></span><span class="pip p4"></span><span class="pip p5"></span></div>
          <div class="face f6"><span class="pip p1"></span><span class="pip p2"></span><span class="pip p3"></span><span class="pip p4"></span><span class="pip p5"></span><span class="pip p6"></span></div>
        </div>
        <span class="hint">Drag dice up and release to roll</span>
      </div>
      <div class="row">
        <button id="rollDice">Roll dice</button>
        <span id="diceResult" class="dice" title="Dice result = moves you can make"></span>
        <button id="endTurn" class="secondary">End turn</button>
      </div>
      <div class="move-buttons">
        <button id="btnUp" class="up" title="Up">↑</button>
        <button id="btnLeft" class="left" title="Left">←</button>
        <button id="btnRight" class="right" title="Right">→</button>
        <button id="btnDown" class="down" title="Down">↓</button>
      </div>
      <div class="controls">WASD or Arrow keys &nbsp;|&nbsp; R = New maze</div>
      <div class="row">
        <label>Difficulty: <select id="difficulty">
          <option value="7">Easy (7×7)</option>
          <option value="11">Medium (11×11)</option>
          <option value="15">Hard (15×15)</option>
          <option value="21">Expert (21×21)</option>
          <option value="25" selected>Large (25×25)</option>
        </select></label>
      </div>
      <div class="row">
        <label>Players: <input type="number" id="numPaths" min="1" max="10" value="3"></label>
      </div>
      <div class="row">
        <button id="aiMaze">Generate with AI</button>
        <button id="newMaze" class="secondary">Random Maze</button>
      </div>
      <div id="won" class="won" style="display:none">*** Player <span id="winnerNum">1</span> WINS! ***</div>
      <div id="error" class="error"></div>
    </div>
  </div>

  <script>
    const DIFFICULTY = { 7: 7, 11: 11, 15: 15, 21: 21, 25: 25 };
    function getDimensions() {
      const d = parseInt(document.getElementById('difficulty').value, 10) || 25;
      return DIFFICULTY[d] || 25;
    }
    const DEFAULT_SIZE = 25;
    const WALL = '#', PATH = ' ', PLAYER = '@', GOAL = 'X', START = 'S';

    function shuffle(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    const PLAYER_COLORS = ['#00ff88', '#4488ff', '#ff8844', '#ff44ff', '#44ff88', '#88aaff', '#ffaa44', '#aa44ff', '#44ffcc'];
    const PLAYER_COLORS_ACTIVE = ['#66ffaa', '#77aaff', '#ffaa66', '#ff77ff', '#66ffaa', '#aaccff', '#ffcc66', '#cc77ff', '#66ffdd'];

    class Labyrinth {
      constructor(width, height, extraPaths = 4, numPlayers = 1) {
        this.width = width;
        this.height = height;
        this.extraPaths = extraPaths;
        this.numPlayers = numPlayers;
        this.grid = [];
        this.players = Array.from({ length: numPlayers }, () => ({ x: 0, y: 0 }));
        this.goalX = width - 1;
        this.goalY = height - 1;
      }

      get playerX() { return this.players[0]?.x ?? 0; }
      get playerY() { return this.players[0]?.y ?? 0; }

      _initGrid() {
        this.grid = Array(this.height).fill(null).map(() =>
          Array(this.width).fill(WALL));
      }

      _carvePath(x, y) {
        this.grid[y][x] = PATH;
        const dirs = shuffle([[0,-2],[2,0],[0,2],[-2,0]]);
        for (const [dx, dy] of dirs) {
          const nx = x + dx, ny = y + dy;
          if (nx >= 1 && nx <= this.width - 2 && ny >= 1 && ny <= this.height - 2 && this.grid[ny][nx] === WALL) {
            this.grid[y + dy / 2][x + dx / 2] = PATH;
            this._carvePath(nx, ny);
          }
        }
      }

      _ensureGoalReachable() {
        const gx = this.goalX, gy = this.goalY;
        if (this.grid[gy][gx] === PATH) return;
        const q = [[gx, gy]];
        const seen = new Set([`${gx},${gy}`]);
        const parent = {};
        let found = null;
        while (q.length) {
          const [x, y] = q.shift();
          for (const [dx, dy] of [[0,-1],[1,0],[0,1],[-1,0]]) {
            const nx = x + dx, ny = y + dy;
            if (nx >= 0 && nx < this.width && ny >= 0 && ny < this.height) {
              if (this.grid[ny][nx] === PATH) {
                found = [x, y];
                break;
              }
              const key = `${nx},${ny}`;
              if (!seen.has(key)) {
                seen.add(key);
                parent[key] = [x, y];
                q.push([nx, ny]);
              }
            }
          }
          if (found) break;
        }
        if (found) {
          let cur = found;
          while (true) {
            this.grid[cur[1]][cur[0]] = PATH;
            if (cur[0] === gx && cur[1] === gy) break;
            cur = parent[`${cur[0]},${cur[1]}`];
          }
        }
      }

      _countPathNeighbors(x, y) {
        let count = 0;
        for (const [dx, dy] of [[0, -1], [1, 0], [0, 1], [-1, 0]]) {
          const nx = x + dx, ny = y + dy;
          if (nx >= 0 && nx < this.width && ny >= 0 && ny < this.height && this.grid[ny][nx] === PATH)
            count++;
        }
        return count;
      }
      _addExtraPaths() {
        const walls = [];
        for (let y = 1; y < this.height - 1; y++)
          for (let x = 1; x < this.width - 1; x++)
            if (this.grid[y][x] === WALL && this._countPathNeighbors(x, y) >= 2)
              walls.push([x, y]);
        const n = Math.min(this.extraPaths, walls.length);
        for (let i = 0; i < n; i++) {
          const idx = Math.floor(Math.random() * walls.length);
          const [x, y] = walls.splice(idx, 1)[0];
          this.grid[y][x] = PATH;
        }
      }

      generate() {
        this._initGrid();
        this._carvePath(1, 1);
        this._ensureGoalReachable();
        this._addExtraPaths();
        this.grid[0][0] = PATH;
        this.grid[this.height - 1][this.width - 1] = PATH;
        if (this.height > 1) this.grid[1][0] = PATH;
        if (this.width > 1) this.grid[0][1] = PATH;
        if (this.height > 1) this.grid[this.height - 2][this.width - 1] = PATH;
        if (this.width > 1) this.grid[this.height - 1][this.width - 2] = PATH;
      }

      loadGrid(grid) {
        if (!grid || !Array.isArray(grid) || grid.length !== this.height) return false;
        this._initGrid();
        for (let y = 0; y < this.height; y++) {
          const row = grid[y];
          if (!Array.isArray(row) || row.length !== this.width) return false;
          for (let x = 0; x < this.width; x++) {
            this.grid[y][x] = row[x] === '#' ? WALL : PATH;
          }
        }
        this.grid[0][0] = PATH;
        this.grid[this.goalY][this.goalX] = PATH;
        if (this.height > 1) this.grid[1][0] = PATH;
        if (this.width > 1) this.grid[0][1] = PATH;
        if (this.height > 1) this.grid[this.height - 2][this.width - 1] = PATH;
        if (this.width > 1) this.grid[this.height - 1][this.width - 2] = PATH;
        this.players = Array.from({ length: this.numPlayers }, () => ({ x: 0, y: 0 }));
        return true;
      }

      canMove(x, y) {
        return x >= 0 && x < this.width && y >= 0 && y < this.height && this.grid[y][x] !== WALL;
      }

      movePlayer(dx, dy, playerIndex = 0) {
        const p = this.players[playerIndex];
        if (!p) return false;
        const nx = p.x + dx, ny = p.y + dy;
        if (this.canMove(nx, ny)) {
          p.x = nx;
          p.y = ny;
          return true;
        }
        return false;
      }

      isGoalReached(playerIndex = 0) {
        const p = this.players[playerIndex];
        return p && p.x === this.goalX && p.y === this.goalY;
      }
    }

    let lab, moves, currentPlayer, movesLeft, totalMoves, diceResult, winner;

    const CELL_SIZE = 32;

    function render() {
      const el = document.getElementById('maze');
      el.innerHTML = '';
      el.style.gridTemplateColumns = `repeat(${lab.width}, ${CELL_SIZE}px)`;
      const playerCells = {};
      lab.players.forEach((p, i) => { playerCells[`${p.x},${p.y}`] = i; });
      const cp = lab.players[currentPlayer];
      if (cp) playerCells[`${cp.x},${cp.y}`] = currentPlayer;
      for (let y = 0; y < lab.height; y++) {
        for (let x = 0; x < lab.width; x++) {
          const div = document.createElement('div');
          div.className = 'cell';
          let content = lab.grid[y][x];
          const pi = playerCells[`${x},${y}`];
          if (pi !== undefined) {
            div.className += ' path';
            const marker = document.createElement('div');
            marker.className = 'marker' + (pi === currentPlayer ? ' active' : '');
            marker.style.background = pi === currentPlayer ? (PLAYER_COLORS_ACTIVE[pi] || '#888') : (PLAYER_COLORS[pi] || '#888');
            marker.style.color = marker.style.background;
            div.appendChild(marker);
            content = null;
          } else if (x === lab.goalX && y === lab.goalY) {
            content = GOAL;
            div.className += ' goal';
          } else if (x === 0 && y === 0 && !playerCells['0,0']) {
            content = START;
            div.className += ' start';
          } else {
            div.className += content === WALL ? ' wall' : ' path';
          }
          if (content !== null) div.textContent = content;
          el.appendChild(div);
        }
      }
      document.getElementById('moves').textContent = totalMoves;
      document.getElementById('movesLeft').textContent = movesLeft;
      document.getElementById('turnInfo').textContent = winner === null
        ? `Player ${currentPlayer + 1}`
        : `Player ${winner + 1} wins!`;
      document.getElementById('diceResult').textContent = diceResult || '—';
      document.getElementById('rollDice').disabled = movesLeft > 0 || winner !== null;
      showDiceFace(diceResult || 1);
      const moveDisabled = movesLeft <= 0 || winner !== null;
      ['btnUp','btnDown','btnLeft','btnRight'].forEach(id => {
        document.getElementById(id).disabled = moveDisabled;
      });
      const legend = document.getElementById('playerLegend');
      legend.innerHTML = lab.players.map((_, i) => {
        const c = i === currentPlayer ? (PLAYER_COLORS_ACTIVE[i] || '#888') : (PLAYER_COLORS[i] || '#888');
        const active = i === currentPlayer ? ' active' : '';
        return `<span class="legend-item${active}" style="color:${c}"><span class="dot" style="background:${c}"></span></span>`;
      }).join('');
      const wonEl = document.getElementById('won');
      wonEl.style.display = winner !== null ? 'block' : 'none';
      if (winner !== null) document.getElementById('winnerNum').textContent = winner + 1;
      showDiceFace(diceResult || 1);
    }

    function showDiceFace(n) {
      const el = document.getElementById('dicePhysical');
      if (!el) return;
      el.querySelectorAll('.face').forEach((f, i) => {
        f.classList.toggle('show', i + 1 === (n || 1));
      });
    }

    function setError(msg) {
      document.getElementById('error').textContent = msg || '';
    }

    function newGame() {
      const numPlayers = Math.min(Math.max(1, parseInt(document.getElementById('numPaths').value, 10) || 1), 9);
      const size = getDimensions();
      const extraPaths = Math.max(4, numPlayers * 2);
      lab = new Labyrinth(size, size, extraPaths, numPlayers);
      lab.generate();
      currentPlayer = 0;
      movesLeft = 0;
      totalMoves = 0;
      diceResult = null;
      winner = null;
      setError('');
      render();
    }

    async function generateWithAI() {
      const numPlayers = Math.min(Math.max(1, parseInt(document.getElementById('numPaths').value, 10) || 1), 9);
      const numPaths = numPlayers * 2;
      const btn = document.getElementById('aiMaze');
      btn.disabled = true;
      setError('Generating maze...');
      try {
        const base = window.location.origin;
        const res = await fetch(`${base}/api/generate-maze`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ numPaths, width: getDimensions(), height: getDimensions() }),
        });
        const data = await res.json();
        if (!res.ok) {
          setError(data.error || 'API error');
          return;
        }
        const size = getDimensions();
        const w = data.width || size;
        const h = data.height || size;
        lab = new Labyrinth(w, h, 0, numPlayers);
        if (lab.loadGrid(data.grid)) {
          currentPlayer = 0;
          movesLeft = 0;
          totalMoves = 0;
          diceResult = null;
          winner = null;
          setError('');
          render();
        } else {
          setError('Invalid maze from AI, using random maze.');
          newGame();
        }
      } catch (e) {
        setError('Failed to reach API: ' + (e.message || 'network error'));
        newGame();
      } finally {
        btn.disabled = false;
      }
    }

    function showDiceFace(n) {
      const dice = document.getElementById('dicePhysical');
      if (!dice) return;
      dice.querySelectorAll('.face').forEach((f, i) => {
        f.classList.toggle('show', i + 1 === n);
      });
    }

    function rollDice(result) {
      if (winner !== null || !lab) return;
      const dice = document.getElementById('dicePhysical');
      if (!dice || dice.classList.contains('rolling')) return;
      const finalValue = typeof result === 'number' ? result : Math.floor(Math.random() * 6) + 1;
      dice.classList.add('rolling');
      dice.style.setProperty('--rise', '-30px');
      dice.style.setProperty('--peak', '-40px');
      dice.style.setProperty('--fall', '-15px');
      dice.style.animation = 'diceRoll 900ms cubic-bezier(0.25, 0.1, 0.25, 1) forwards';
      let f = 0;
      const iv = setInterval(() => { f++; showDiceFace((f % 6) + 1); if (f >= 10) clearInterval(iv); }, 80);
      setTimeout(() => {
        clearInterval(iv);
        showDiceFace(finalValue);
        dice.classList.remove('rolling');
        dice.style.animation = '';
        diceResult = finalValue;
        movesLeft = finalValue;
        render();
      }, 900);
    }

    function setupDiceThrow() {
      const dice = document.getElementById('dicePhysical');
      const tray = document.getElementById('diceTray');
      if (!dice || !tray) return;
      let dragging = false, startX, startY, startT;

      function applyRoll(finalValue) {
        dice.classList.remove('rolling');
        dice.style.animation = '';
        dice.style.transform = '';
        dice.style.removeProperty('--rise');
        dice.style.removeProperty('--peak');
        dice.style.removeProperty('--fall');
        diceResult = finalValue;
        movesLeft = finalValue;
        showDiceFace(finalValue);
        render();
      }

      function doThrow(velY, velX) {
        if (winner !== null || movesLeft > 0) return;
        dice.classList.add('rolling');
        const power = Math.min(1, Math.sqrt(velX * velX + velY * velY) / 80);
        const rollDur = 600 + Math.round(power * 500);
        const rise = Math.min(50, Math.abs(velY) + 25);
        dice.style.setProperty('--rise', `-${rise}px`);
        dice.style.setProperty('--peak', `-${rise + 10}px`);
        dice.style.setProperty('--fall', `-${rise / 2}px`);
        dice.style.animation = `diceRoll ${rollDur}ms cubic-bezier(0.25, 0.1, 0.25, 1) forwards`;
        const finalValue = Math.floor(Math.random() * 6) + 1;
        let frame = 0;
        const faceInterval = setInterval(() => {
          frame++;
          showDiceFace((frame % 6) + 1);
          if (frame >= 12) clearInterval(faceInterval);
        }, rollDur / 12);
        setTimeout(() => {
          clearInterval(faceInterval);
          showDiceFace(finalValue);
          setTimeout(() => applyRoll(finalValue), 150);
        }, rollDur);
      }

      function start(e) {
        if (winner !== null || movesLeft > 0) return;
        e.preventDefault();
        dragging = true;
        const t = e.touches ? e.touches[0] : e;
        startX = t.clientX;
        startY = t.clientY;
        startT = Date.now();
      }
      function move(e) {
        if (!dragging) return;
        e.preventDefault();
      }
      function end(e) {
        if (!dragging) return;
        e.preventDefault();
        dragging = false;
        const x = e.clientX ?? (e.changedTouches && e.changedTouches[0].clientX);
        const y = e.clientY ?? (e.changedTouches && e.changedTouches[0].clientY);
        const dt = Date.now() - startT;
        const velX = (x - startX) / Math.max(0.05, dt / 100);
        const velY = (y - startY) / Math.max(0.05, dt / 100);
        if (Math.abs(velY) > 5 || Math.abs(velX) > 5) doThrow(velY, velX);
      }
      dice.addEventListener('mousedown', start);
      dice.addEventListener('touchstart', start, { passive: false });
      document.addEventListener('mousemove', move);
      document.addEventListener('touchmove', move, { passive: false });
      document.addEventListener('mouseup', end);
      document.addEventListener('touchend', end, { passive: false });
    }

    function endTurn() {
      if (winner !== null) return;
      currentPlayer = (currentPlayer + 1) % lab.numPlayers;
      movesLeft = 0;
      diceResult = null;
      render();
    }

    function doMove(dx, dy) {
      if (winner !== null || movesLeft <= 0) return;
      if (lab.movePlayer(dx, dy, currentPlayer)) {
        movesLeft--;
        totalMoves++;
        if (lab.isGoalReached(currentPlayer)) winner = currentPlayer;
        if (movesLeft === 0 && winner === null) {
          currentPlayer = (currentPlayer + 1) % lab.numPlayers;
          diceResult = null;
        }
        render();
      }
    }

    document.addEventListener('keydown', (e) => {
      if (e.key === 'r' || e.key === 'R') { newGame(); e.preventDefault(); return; }
      const map = { ArrowUp: [0,-1], ArrowDown: [0,1], ArrowLeft: [-1,0], ArrowRight: [1,0],
        w: [0,-1], W: [0,-1], s: [0,1], S: [0,1], a: [-1,0], A: [-1,0], d: [1,0], D: [1,0] };
      const d = map[e.key];
      if (d) { doMove(d[0], d[1]); e.preventDefault(); }
    });

    ['btnUp','btnDown','btnLeft','btnRight'].forEach((id, i) => {
      const [dx, dy] = [[0,-1],[0,1],[-1,0],[1,0]][i];
      document.getElementById(id).addEventListener('click', () => doMove(dx, dy));
    });

    document.getElementById('newMaze').addEventListener('click', newGame);
    document.getElementById('aiMaze').addEventListener('click', generateWithAI);
    document.getElementById('rollDice').addEventListener('click', () => rollDice());
    document.getElementById('endTurn').addEventListener('click', endTurn);
    setupDiceThrow();

    newGame();
  </script>
</body>
</html>
