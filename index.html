<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Labyrinth - Maze Game</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Courier New', monospace;
      background: #0a0a0f;
      color: #c0c0c0;
    }
    h1 { font-size: 1.5rem; margin-bottom: 0.5rem; color: #00ff88; }
    .game-container {
      background: #1a1a24;
      padding: 1.5rem;
      border-radius: 8px;
      border: 1px solid #333;
      box-shadow: 0 0 20px rgba(0,255,136,0.1);
    }
    .maze {
      display: inline-grid;
      gap: 0;
      font-size: 1.1rem;
      line-height: 1.2;
      letter-spacing: 0.05em;
    }
    .cell {
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .cell.wall { color: #555; background: #2a2a35; }
    .cell.path { color: #333; background: #1e1e28; }
    .cell.start { color: #00ff88; background: #1e2e24; }
    .cell.goal { color: #ff4444; background: #2e1e1e; }
    .cell.player { color: #00ff88; background: #1e2e24; font-weight: bold; }
    .cell.p1 { color: #00ff88; background: #1e2e24; font-weight: bold; }
    .cell.p2 { color: #4488ff; background: #1e2e48; font-weight: bold; }
    .cell.p3 { color: #ff8844; background: #482e1e; font-weight: bold; }
    .cell.p4 { color: #ff44ff; background: #481e48; font-weight: bold; }
    .dice { font-size: 1.5rem; margin: 0 0.5rem; }
    .info { margin-top: 1rem; font-size: 0.85rem; color: #888; }
    .controls { margin-top: 0.5rem; font-size: 0.8rem; }
    .won { margin-top: 1rem; color: #00ff88; font-weight: bold; }
    .row { display: flex; gap: 1rem; align-items: center; margin-top: 0.75rem; flex-wrap: wrap; }
    .row label { display: flex; align-items: center; gap: 0.5rem; }
    .row input[type="number"] { width: 3rem; padding: 0.25rem; font-family: inherit; background: #2a2a35; border: 1px solid #444; color: #c0c0c0; border-radius: 4px; }
    button {
      padding: 0.5rem 1rem;
      font-family: inherit;
      font-size: 0.9rem;
      background: #00ff88;
      color: #0a0a0f;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    button:hover { background: #00cc6a; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    button.secondary { background: #444; color: #c0c0c0; }
    button.secondary:hover { background: #555; }
    .error { color: #ff6666; font-size: 0.85rem; margin-top: 0.5rem; }
  </style>
</head>
<body>
  <h1>LABYRINTH</h1>
  <div class="game-container">
    <div id="maze" class="maze"></div>
    <div class="info">
      <span id="turnInfo">Player 1</span> &nbsp;|&nbsp;
      Moves left: <span id="movesLeft">0</span> &nbsp;|&nbsp;
      Moves: <span id="moves">0</span> &nbsp;|&nbsp; S=Start &nbsp; X=Goal
    </div>
    <div class="row">
      <button id="rollDice">Roll dice</button>
      <span id="diceResult" class="dice" title="Dice result = moves you can make"></span>
      <button id="endTurn" class="secondary">End turn</button>
    </div>
    <div class="controls">WASD or Arrow keys to move &nbsp;|&nbsp; R = New maze</div>
    <div class="row">
      <label>Paths (players): <input type="number" id="numPaths" min="1" max="10" value="3"></label>
      <button id="aiMaze">Generate with AI</button>
      <button id="newMaze" class="secondary">Random Maze</button>
    </div>
    <div id="won" class="won" style="display:none">*** Player <span id="winnerNum">1</span> WINS! ***</div>
    <div id="error" class="error"></div>
  </div>

  <script>
    const WIDTH = 11, HEIGHT = 11;
    const WALL = '#', PATH = ' ', PLAYER = '@', GOAL = 'X', START = 'S';

    function shuffle(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    const PLAYER_SYMBOLS = ['@', '2', '3', '4', '5', '6', '7', '8', '9'];

    class Labyrinth {
      constructor(width, height, extraPaths = 4, numPlayers = 1) {
        this.width = width;
        this.height = height;
        this.extraPaths = extraPaths;
        this.numPlayers = numPlayers;
        this.grid = [];
        this.players = Array.from({ length: numPlayers }, () => ({ x: 0, y: 0 }));
        this.goalX = width - 1;
        this.goalY = height - 1;
      }

      get playerX() { return this.players[0]?.x ?? 0; }
      get playerY() { return this.players[0]?.y ?? 0; }

      _initGrid() {
        this.grid = Array(this.height).fill(null).map(() =>
          Array(this.width).fill(WALL));
      }

      _carvePath(x, y) {
        this.grid[y][x] = PATH;
        const dirs = shuffle([[0,-2],[2,0],[0,2],[-2,0]]);
        for (const [dx, dy] of dirs) {
          const nx = x + dx, ny = y + dy;
          if (nx >= 1 && nx <= this.width - 2 && ny >= 1 && ny <= this.height - 2 && this.grid[ny][nx] === WALL) {
            this.grid[y + dy / 2][x + dx / 2] = PATH;
            this._carvePath(nx, ny);
          }
        }
      }

      _ensureGoalReachable() {
        const gx = this.goalX, gy = this.goalY;
        if (this.grid[gy][gx] === PATH) return;
        const q = [[gx, gy]];
        const seen = new Set([`${gx},${gy}`]);
        const parent = {};
        let found = null;
        while (q.length) {
          const [x, y] = q.shift();
          for (const [dx, dy] of [[0,-1],[1,0],[0,1],[-1,0]]) {
            const nx = x + dx, ny = y + dy;
            if (nx >= 0 && nx < this.width && ny >= 0 && ny < this.height) {
              if (this.grid[ny][nx] === PATH) {
                found = [x, y];
                break;
              }
              const key = `${nx},${ny}`;
              if (!seen.has(key)) {
                seen.add(key);
                parent[key] = [x, y];
                q.push([nx, ny]);
              }
            }
          }
          if (found) break;
        }
        if (found) {
          let cur = found;
          while (true) {
            this.grid[cur[1]][cur[0]] = PATH;
            if (cur[0] === gx && cur[1] === gy) break;
            cur = parent[`${cur[0]},${cur[1]}`];
          }
        }
      }

      _addExtraPaths() {
        const walls = [];
        for (let y = 1; y < this.height - 1; y++)
          for (let x = 1; x < this.width - 1; x++)
            if (this.grid[y][x] === WALL) walls.push([x, y]);
        const n = Math.min(this.extraPaths, walls.length);
        for (let i = 0; i < n; i++) {
          const idx = Math.floor(Math.random() * walls.length);
          const [x, y] = walls.splice(idx, 1)[0];
          this.grid[y][x] = PATH;
        }
      }

      generate() {
        this._initGrid();
        this._carvePath(1, 1);
        this._ensureGoalReachable();
        this._addExtraPaths();
        this.grid[0][0] = PATH;
        this.grid[this.height - 1][this.width - 1] = PATH;
        if (this.height > 1) this.grid[1][0] = PATH;
        if (this.width > 1) this.grid[0][1] = PATH;
        if (this.height > 1) this.grid[this.height - 2][this.width - 1] = PATH;
        if (this.width > 1) this.grid[this.height - 1][this.width - 2] = PATH;
      }

      loadGrid(grid) {
        if (!grid || !Array.isArray(grid) || grid.length !== this.height) return false;
        this._initGrid();
        for (let y = 0; y < this.height; y++) {
          const row = grid[y];
          if (!Array.isArray(row) || row.length !== this.width) return false;
          for (let x = 0; x < this.width; x++) {
            this.grid[y][x] = row[x] === '#' ? WALL : PATH;
          }
        }
        this.grid[0][0] = PATH;
        this.grid[this.goalY][this.goalX] = PATH;
        if (this.height > 1) this.grid[1][0] = PATH;
        if (this.width > 1) this.grid[0][1] = PATH;
        if (this.height > 1) this.grid[this.height - 2][this.width - 1] = PATH;
        if (this.width > 1) this.grid[this.height - 1][this.width - 2] = PATH;
        this.players = Array.from({ length: this.numPlayers }, () => ({ x: 0, y: 0 }));
        return true;
      }

      canMove(x, y) {
        return x >= 0 && x < this.width && y >= 0 && y < this.height && this.grid[y][x] !== WALL;
      }

      movePlayer(dx, dy, playerIndex = 0) {
        const p = this.players[playerIndex];
        if (!p) return false;
        const nx = p.x + dx, ny = p.y + dy;
        if (this.canMove(nx, ny)) {
          p.x = nx;
          p.y = ny;
          return true;
        }
        return false;
      }

      isGoalReached(playerIndex = 0) {
        const p = this.players[playerIndex];
        return p && p.x === this.goalX && p.y === this.goalY;
      }
    }

    let lab, moves, currentPlayer, movesLeft, totalMoves, diceResult, winner;

    function render() {
      const el = document.getElementById('maze');
      el.innerHTML = '';
      el.style.gridTemplateColumns = `repeat(${lab.width}, 24px)`;
      const playerCells = {};
      lab.players.forEach((p, i) => { playerCells[`${p.x},${p.y}`] = i; });
      const cp = lab.players[currentPlayer];
      if (cp) playerCells[`${cp.x},${cp.y}`] = currentPlayer;
      for (let y = 0; y < lab.height; y++) {
        for (let x = 0; x < lab.width; x++) {
          const div = document.createElement('div');
          div.className = 'cell';
          let content = lab.grid[y][x];
          const pi = playerCells[`${x},${y}`];
          if (pi !== undefined) {
            content = PLAYER_SYMBOLS[pi] || '@';
            div.className += ' p' + (pi + 1);
          } else if (x === lab.goalX && y === lab.goalY) {
            content = GOAL;
            div.className += ' goal';
          } else if (x === 0 && y === 0 && !playerCells['0,0']) {
            content = START;
            div.className += ' start';
          } else {
            div.className += content === WALL ? ' wall' : ' path';
          }
          div.textContent = content;
          el.appendChild(div);
        }
      }
      document.getElementById('moves').textContent = totalMoves;
      document.getElementById('movesLeft').textContent = movesLeft;
      document.getElementById('turnInfo').textContent = winner === null
        ? `Player ${currentPlayer + 1}`
        : `Player ${winner + 1} wins!`;
      document.getElementById('diceResult').textContent = diceResult || '—';
      document.getElementById('rollDice').disabled = movesLeft > 0 || winner !== null;
      const wonEl = document.getElementById('won');
      wonEl.style.display = winner !== null ? 'block' : 'none';
      if (winner !== null) document.getElementById('winnerNum').textContent = winner + 1;
    }

    function setError(msg) {
      document.getElementById('error').textContent = msg || '';
    }

    function newGame() {
      const numPlayers = Math.min(Math.max(1, parseInt(document.getElementById('numPaths').value, 10) || 1), 9);
      lab = new Labyrinth(WIDTH, HEIGHT, 4, numPlayers);
      lab.generate();
      currentPlayer = 0;
      movesLeft = 0;
      totalMoves = 0;
      diceResult = null;
      winner = null;
      setError('');
      render();
    }

    async function generateWithAI() {
      const numPaths = parseInt(document.getElementById('numPaths').value, 10) || 3;
      const btn = document.getElementById('aiMaze');
      btn.disabled = true;
      setError('Generating maze...');
      try {
        const base = window.location.origin;
        const res = await fetch(`${base}/api/generate-maze`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ numPaths, width: WIDTH, height: HEIGHT }),
        });
        const data = await res.json();
        if (!res.ok) {
          setError(data.error || 'API error');
          return;
        }
        const w = data.width || WIDTH;
        const h = data.height || HEIGHT;
        const numPlayers = Math.min(Math.max(1, parseInt(document.getElementById('numPaths').value, 10) || 1), 9);
        lab = new Labyrinth(w, h, 0, numPlayers);
        if (lab.loadGrid(data.grid)) {
          currentPlayer = 0;
          movesLeft = 0;
          totalMoves = 0;
          diceResult = null;
          winner = null;
          setError('');
          render();
        } else {
          setError('Invalid maze from AI, using random maze.');
          newGame();
        }
      } catch (e) {
        setError('Failed to reach API: ' + (e.message || 'network error'));
        newGame();
      } finally {
        btn.disabled = false;
      }
    }

    function rollDice() {
      if (winner !== null) return;
      diceResult = Math.floor(Math.random() * 6) + 1;
      movesLeft = diceResult;
      render();
    }

    function endTurn() {
      if (winner !== null) return;
      currentPlayer = (currentPlayer + 1) % lab.numPlayers;
      movesLeft = 0;
      diceResult = null;
      render();
    }

    document.addEventListener('keydown', (e) => {
      if (e.key === 'r' || e.key === 'R') { newGame(); e.preventDefault(); return; }
      if (winner !== null || movesLeft <= 0) return;
      const map = { ArrowUp: [0,-1], ArrowDown: [0,1], ArrowLeft: [-1,0], ArrowRight: [1,0],
        w: [0,-1], W: [0,-1], s: [0,1], S: [0,1], a: [-1,0], A: [-1,0], d: [1,0], D: [1,0] };
      const d = map[e.key];
      if (d && lab.movePlayer(d[0], d[1], currentPlayer)) {
        movesLeft--;
        totalMoves++;
        if (lab.isGoalReached(currentPlayer)) winner = currentPlayer;
        render();
        e.preventDefault();
      }
    });

    document.getElementById('newMaze').addEventListener('click', newGame);
    document.getElementById('aiMaze').addEventListener('click', generateWithAI);
    document.getElementById('rollDice').addEventListener('click', rollDice);
    document.getElementById('endTurn').addEventListener('click', endTurn);

    newGame();
  </script>
</body>
</html>
